<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Career Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body {
    background: linear-gradient(135deg, #1e1e2f, #2a2a40);
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

.navbar {
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
}

.card {
    background: rgba(255,255,255,0.05);
    border: none;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.btn-custom {
    background: #6c63ff;
    border: none;
}

.btn-custom:hover {
    background: #574bff;
}
</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand fw-bold">🚀 AI Career</a>

<div>
<a href="/dashboard" class="btn btn-outline-light me-2">Dashboard</a>
<a href="/resume" class="btn btn-outline-light me-2">Resume</a>
<a href="/jobs" class="btn btn-outline-light">Jobs</a>
</div>
</div>
</nav>

<div class="container mt-5">
{% block content %}{% endblock %}
</div>

</body>
</html>
