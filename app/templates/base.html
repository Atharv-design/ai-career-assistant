<!DOCTYPE html>
<html>
<head>

<title>AI Career</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

/* Glass UI */
.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
}

/* Gradient Text */
.text-gradient {
    background: linear-gradient(45deg, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    color: transparent;
}

/* Buttons */
.btn-custom {
    background: linear-gradient(45deg, #6366f1, #8b5cf6);
    border: none;
    color: white;
}

/* Upload box */
.upload-box {
    border: 2px dashed #555;
    border-radius: 10px;
}

/* Inputs */
.input-dark {
    background: #1e293b;
    color: white;
    border: none;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🚀 AI Career</span>

    <div>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
        <a href="/resume" class="btn btn-outline-light btn-sm">Resume</a>
        <a href="/jobs" class="btn btn-outline-light btn-sm">Jobs</a>
        <a href="/chat" class="btn btn-outline-light btn-sm">AI Chat</a>
    </div>
</nav>

{% block content %}{% endblock %}

</body>
</html>
