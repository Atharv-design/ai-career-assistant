{% extends "base.html" %}
{% block content %}

<div class="glass">
<h3>Job Finder</h3>

<form method="POST">
<input name="query" class="form-control mb-3" placeholder="Search jobs">
<button class="btn btn-main">Search</button>
</form>

<div class="mt-3">
{% for job in jobs %}
<div class="card p-2 mb-2">{{job}}</div>
{% endfor %}
</div>

</div>

{% endblock %}
