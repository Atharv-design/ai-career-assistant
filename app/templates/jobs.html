{% extends "base.html" %}
{% block content %}

<div class="glass">
<h3>Job Finder</h3>

<form method="POST">
<input name="query" class="form-control mb-2" placeholder="Search jobs">
<button class="btn btn-main">Search</button>
</form>

<ul class="mt-3">
{% for job in jobs %}
<li>{{job}}</li>
{% endfor %}
</ul>

</div>

{% endblock %}
