{% extends "base.html" %}
{% block content %}

<div class="container mt-5">

<div class="card p-4 shadow-lg glass">

<h2 class="mb-4 text-gradient">📄 Resume Analyzer</h2>

<!-- Upload Box -->
<form method="POST" enctype="multipart/form-data" id="uploadForm">

<div class="upload-box text-center p-5 mb-4">
    
    <input type="file" name="file" id="fileInput" hidden>

    <div onclick="triggerUpload()" style="cursor:pointer">
        <h5>📂 Click to Upload Resume</h5>
        <p class="text-muted">PDF / DOCX supported</p>
    </div>

</div>

<!-- Preview -->
<div id="filePreview" class="mb-3"></div>

<button class="btn btn-custom px-4">Analyze 🚀</button>

</form>

<!-- Loader -->
<div id="loader" class="text-center mt-4 d-none">
    <div class="spinner-border text-primary"></div>
    <p class="mt-2">Analyzing Resume...</p>
</div>

</div>

</div>

<script>
function triggerUpload(){
    document.getElementById("fileInput").click();
}

document.getElementById("fileInput").addEventListener("change", function(e){
    let file = e.target.files[0];
    document.getElementById("filePreview").innerHTML = 
        "<div class='alert alert-info'>📎 " + file.name + "</div>";
});

document.getElementById("uploadForm").addEventListener("submit", function(){
    document.getElementById("loader").classList.remove("d-none");
});
</script>

{% endblock %}
