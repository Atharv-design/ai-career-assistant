{% extends "base.html" %}
{% block content %}

<div class="glass">
<h3>Resume Analyzer</h3>

<form method="POST" enctype="multipart/form-data">
<input type="file" name="resume" class="form-control mb-3">
<button class="btn btn-main">Analyze</button>
</form>

{% if result %}
<div class="mt-3">
<h4>Score: {{result.score}}%</h4>

<ul>
{% for item in result.improvements %}
<li>{{item}}</li>
{% endfor %}
</ul>

</div>
{% endif %}

</div>

{% endblock %}
