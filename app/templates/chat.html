{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
    <div class="glass p-4">

        <h3>💬 AI Chat</h3>

        <div id="chatBox" style="height:350px; overflow:auto;"></div>

        <div class="d-flex mt-3">
            <input id="msg" class="form-control me-2" placeholder="Ask anything...">
            <button onclick="sendMsg()" class="btn btn-main">Send</button>
        </div>

    </div>
</div>

<script>
function sendMsg(){

    let msg = $("#msg").val();

    $("#chatBox").append(`<div class="text-end">🧑 ${msg}</div>`);

    $.ajax({
        url:"/chat_api",
        method:"POST",
        contentType:"application/json",
        data: JSON.stringify({message:msg}),
        success:function(res){
            $("#chatBox").append(`<div>🤖 ${res.reply}</div>`);
        }
    });

    $("#msg").val("");
}
</script>

{% endblock %}
