{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
    <div class="card p-4 glass">
        <h3>💬 AI Career Chat</h3>

        <div id="chatBox" style="height:300px; overflow-y:auto;"></div>

        <input id="msg" class="form-control mt-3" placeholder="Ask something...">
        <button onclick="sendMsg()" class="btn btn-primary mt-2">Send</button>
    </div>
</div>

<script>
function sendMsg(){
    let msg = document.getElementById("msg").value;

    fetch("/chat_api",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(res=>res.json())
    .then(data=>{
        let box = document.getElementById("chatBox");
        box.innerHTML += "<p><b>You:</b> "+msg+"</p>";
        box.innerHTML += "<p><b>AI:</b> "+data.reply+"</p>";
    });
}
</script>

{% endblock %}
