{% extends "base.html" %}
{% block content %}

<div class="glass">
<h3>AI Chat</h3>

<div id="chatBox" style="height:300px; overflow:auto;"></div>

<div class="d-flex mt-2">
<input id="msg" class="form-control me-2">
<button onclick="sendMsg()" class="btn btn-main">Send</button>
</div>

</div>

<script>
function sendMsg(){
let msg=$("#msg").val();

$("#chatBox").append("<div>🧑 "+msg+"</div>");

$.ajax({
url:"/chat_api",
method:"POST",
contentType:"application/json",
data:JSON.stringify({message:msg}),
success:function(res){
$("#chatBox").append("<div>🤖 "+res.reply+"</div>");
}
});

$("#msg").val("");
}
</script>

{% endblock %}
